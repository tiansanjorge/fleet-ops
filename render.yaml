services:
  - type: web
    name: fleetops-api
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile
    startCommand: pnpm --filter @fleetops/api start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false
