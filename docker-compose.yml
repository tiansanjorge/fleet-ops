services:
  postgres:
    image: postgres:16-alpine
    container_name: fleetops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fleetops
      POSTGRES_PASSWORD: fleetops
      POSTGRES_DB: fleetops
    ports:
      - "5432:5432"
    volumes:
      - fleetops-pgdata:/var/lib/postgresql/data

volumes:
  fleetops-pgdata:
